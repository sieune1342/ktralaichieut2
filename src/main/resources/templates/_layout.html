<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <title th:replace="${title}">Bài 5_QLSP JPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
</head>
<body>

    <nav th:fragment="navbar" class="navbar bg-dark border-bottom border-body" data-bs-theme="dark">
        <div class="container-fluid px-4">
            <div>
                <a class="navbar-brand" th:href="@{/products}">Home</a>
                <a class="navbar-brand" th:href="@{/products/add}">Products</a>
                <a class="navbar-brand" th:href="@{/cart}">Cart</a>
            </div>
            <div>
                <span class="badge text-bg-warning" th:text="'Giỏ hàng: ' + (${cartCount} ?: 0)"></span>
            </div>
        </div>
    </nav>

    <div th:fragment="footer" class="card-footer text-center mt-5">
        <hr/>
        <p>&copy; 2026 - Phát triển ứng dụng với J2EE</p>
    </div>

</body>
</html>
